{% extends "base.html" %}

{% block title %}Entrar | FEM{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Entrar</h1>
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
          {% endif %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Usuário</label>
            <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Senha</label>
            <input type="password" name="password" autocomplete="current-password" required id="id_password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
