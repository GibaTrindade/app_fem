{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ title }}</h1>
  <p><strong>PTM:</strong> {{ ptm.ordem }} - {{ ptm.municipio }}</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions">
      <button type="submit" class="btn">Salvar</button>
      <a class="btn sec" href="{% url 'ptm_detail' ptm.pk %}?tab={{ tab }}">Voltar</a>
    </div>
  </form>
</div>
{% endblock %}
