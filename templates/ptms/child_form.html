{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h1 class="h4 mb-2">{{ title }}</h1>
    <p class="text-muted mb-3"><strong>PTM:</strong> {{ ptm.ordem }} - {{ ptm.municipio }}</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a class="btn btn-outline-secondary" href="{% url 'ptm_detail' ptm.pk %}?tab={{ tab }}">Voltar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
